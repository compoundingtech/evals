# Cell: convoy-doctor-foreign-box — the regression guard for the two Johannes doctor FALSE-NEGATIVES
# (convoy #77 auth-probe classifier + #78 st-hooks discovery). On a FOREIGN box — a machine that isn't the one
# that set the network up: `st` is OFF PATH, and a claude auth probe comes back INCONCLUSIVE (it errors for a
# NON-auth reason: a sandbox restriction, a wrong path, a timeout) — `convoy doctor` must report HONESTLY. It
# must NOT say untrue things: no false "smalltalk hooks NOT found" (st off PATH ≠ hooks absent — they're wired
# via each agent's absolute ST_BIN), and no false "Claude is NOT signed in" (an inconclusive probe is "could
# not verify", not signed-out). Deterministic, no LLM, box-free (--quick spawns no agents).
#
# WHY THIS EXISTS (Nathan's bar: the doctor must not say untrue things). `convoy doctor` is the first thing a
# new user runs. When it FALSE-fails a healthy setup — "your hooks are missing", "you're signed out" — the user
# chases a non-problem and loses trust in the tool. Both false-negatives were hit in the field on Johannes's box
# (st off PATH; a sandboxed probe) and fixed in convoy #77 (a PURE classifyProbe: only a CLEAR not-logged-in
# signal is signed-out; a non-auth error is inconclusive) + #78 (discover smalltalk via ST_BIN before `which st`,
# and an honest non-blocking WARN when it truly can't be located — never a red "NOT found"). This cell is the
# regression guard so neither can silently come back.
id    = "convoy-doctor-foreign-box"
title = "on a FOREIGN box (st off PATH + an inconclusive claude probe) convoy doctor reports HONESTLY — no false 'hooks not found', no false 'not signed in'"
tier  = 1
axes  = ["isolation", "task-success"]

evaluates = """
Whether the REAL `convoy doctor --quick` tells the TRUTH on a foreign box — a machine that didn't set the
network up, so `st` is not on PATH and a claude auth probe may error for a non-auth reason:

(a) HOOKS HONESTY (#78): with `st` genuinely OFF PATH (removed from the run's PATH — doctor's Tooling leg flags
    it), the Hooks leg must NOT report a false "smalltalk hooks NOT found". st-off-PATH is not proof the hooks are
    absent: convoy discovers smalltalk via each agent's absolute ST_BIN (and falls back to a sibling checkout),
    so it honestly reports "smalltalk hooks found" — or, if it genuinely can't locate them, a non-blocking WARN
    that never asserts absence. The pre-#78 bug keyed discovery off `which st` and hard-failed "NOT found".

(b) AUTH HONESTY (#77): an INCONCLUSIVE probe (a non-auth error — sandbox/bad-path/timeout) is reported as
    "could not verify Claude auth — the probe errored", NOT a false "Claude is NOT signed in". The pre-#77 bug
    had an over-broad AUTH_FAIL regex that mislabeled any errored probe brushing a loose word as signed-out.

(c) MUTATION-VALID CONTRAST: the SAME foreign box, but with a claude probe that emits a CLEAR not-logged-in
    signal ("Not logged in · Please run /login"), DOES yield "Claude is NOT signed in". This proves the auth
    check is non-vacuous — it can and does report signed-out on a real signal — so the honest (b) pass is
    meaningful, not an always-inconclusive rubber stamp.

ISOLATION: doctor is scoped with --network <sandbox> and ambient ST_ROOT/PTY_ROOT/CONVOY_NETWORK are unset (a
bare doctor / ST_ROOT hits the operator's REAL default net). --quick spawns no agents. Never touches the fleet.
"""

[setup]
work_dir = "${EVAL_SANDBOX:-/tmp}/cdfb  (SHORT path — keeps PTY_ROOT under the doctor's length gate). probe.sh builds the foreign box + runs doctor twice, both scoped with --network + a clean env."
mechanism = """
The foreign box is constructed deterministically — no live auth, no second machine:
  - st OFF PATH: probe.sh drops EVERY dir that carries an `st` from PATH (re-providing node/pty/convoy via
    symlinks so convoy still runs), and points ST_BIN at the real st — exactly the Johannes shape (st unusable
    on PATH, hooks wired via ST_BIN).
  - INCONCLUSIVE probe: a `claude` shim on PATH that exits non-zero with a NON-auth error (a sandbox denial),
    so classifyProbe returns `inconclusive` (not `signed-out`).
  - CONTRAST probe: a `claude` shim that prints a CLEAR "Not logged in · Please run /login" — a real signed-out
    signal.
Ground truth @ convoy #77 (8ee8588) + #78 (0816121). Net torn down with convoy down.
"""
builder = "fixture/probe.sh (runs `convoy doctor --quick` twice on the foreign box — inconclusive + clear-signout — and records the honesty shape from doctor's REAL output). fixture/grade.sh (asserts hooks + auth honesty + the mutation-valid contrast). No LLM."

[grader]
mechanical = """
fixture/grade.sh — REAL doctor stdout, never a self-report. Hard gates:
  SCENARIO-REAL     — doctor's Tooling leg flags 'st NOT on PATH' (st was genuinely removed; else the guard is vacuous).
  HOOKS-HONEST (#78)— no false 'hooks NOT found' + honest 'smalltalk hooks found' (off-PATH discovery via ST_BIN).
  AUTH-HONEST (#77) — an inconclusive probe reads 'could not verify Claude auth', NOT 'Claude is NOT signed in'.
  CONTRAST (mutation-valid) — a CLEAR not-logged-in signal DOES yield 'Claude is NOT signed in' (non-vacuous).
  ISOLATION         — no doctor/cdfb session in the operator's global pty root (--network scoped it to the sandbox).
"""

[dependency]
convoy = "convoy #77 (auth-probe classifyProbe: only a CLEAR signal is signed-out; a non-auth error is inconclusive) + #78 (discover smalltalk via ST_BIN before `which st`; an honest non-blocking WARN when unlocatable, never a red 'NOT found'). GREEN once BOTH land (8ee8588 / 0816121). NOTE: on a DEV box convoy sits beside a smalltalk checkout, so discovery's ../smalltalk sibling also finds the hooks — the (a) leg here is a no-false-absence guard; a true Johannes box with no sibling exercises the ST_BIN path fully. Scope doctor with --network (a bare doctor / ST_ROOT hits the real default net)."
reuse = "Deterministic real-command + assert-output discipline + the mutation-valid contrast: convoy-doctor-preinit / convoy-doctor-structure. Sibling: convoy-doctor-preinit (the friendly FIRST-command UX) — this is the friendly HONEST-diagnosis guard: preinit says 'here's your next step' on a fresh box; foreign-box says 'I won't claim your hooks/auth are broken when I can't prove it' on someone else's box."
