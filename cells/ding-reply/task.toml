# Cell: ding-reply — a no-MCP agent RECEIVES a message via ding and REPLIES over the `st` CLI (the threaded
# `st message reply` verb). This is the MCP-less config (ding, no MCP, no app) and the exact coverage the
# `st message reply` bug slipped through — no other cell exercised + ASSERTED the CLI reply verb. Fully synthetic
# + hermetic. See README.md.
id    = "ding-reply"
title = "A no-MCP (ding) agent replies over the st CLI — the threaded `st message reply` path, end-to-end"
tier  = 1   # single agent, but critical coverage
axes  = ["isolation", "task-success", "autonomy", "coordination", "cost"]

evaluates = """
Whether the no-MCP (ding) REPLY path works end-to-end: an agent launched `st launch claude --ding` (no MCP
server, an `st ding` sidecar for inbound, the `st` CLI for all bus ops) receives a message and REPLIES ON THE
THREAD via `st message reply` — the CLI verb, not the MCP tool. This is the MCP-less config (ding-only, no MCP,
no macOS app) and it is EXACTLY the gap that let the `st message reply` bug through: every other cell replies via
the MCP tool (`st_msg_reply`) or asserts only that "a message came back" (which a fresh `st message send` would
satisfy). This cell seeds a message requiring a reply, and its grader asserts the reply landed THREADED
(`in-reply-to:` the seeded message) — which a plain send does not produce — so it FAILS LOUD if the CLI reply
verb is missing or broken. Trivial task on purpose: the coverage is the reply path, not the work.
"""

# Frozen world: setup-sandbox.sh materializes a single agent's cwd with an ANSWER.txt (the token it must read +
# reply with). Fully synthetic. spin.sh self-isolates the bus ($SB/st-root) — never the operator's live network.
[[repos]]
repo = "work/ (the agent's cwd)"
role = "holds ANSWER.txt — the token the requester asks the agent to read + reply with (the grader's source of truth)."

[team]
agent = "a single worker, `st launch claude --ding` (NO MCP), auto permission. A synthetic requester (dr-req) seeds the kick + receives the reply (not a live agent — just an inbox owner)."

[delivery]
path = "DING (no MCP, no app) — the product default / MCP-less config. The `st ding` sidecar delivers inbound as [DING] pokes; the agent uses the `st` CLI (read/reply/archive/status). Complements the MCP-opt-in path proven by the MCP cells."

# GRADER — visible + held-out.
[grader]
no_mcp        = "hard gate: no `.mcp.json` in the agent dir — the launch was genuinely MCP-less (--ding)."
threaded_reply = "hard gate + discriminator: a reply from the agent in the requester's inbox with `in-reply-to:` == the seeded kick — proves `st message reply` (the threaded CLI verb), which a plain `st message send` cannot fake; + the reply body carries the ANSWER.txt token (task-success)."
boot          = "the [DING]-delivered kick was drained (read+archived) over the `st` CLI — the no-MCP boot ritual ran."

[autonomy]
metric = "rescues to boot + reply over ding/CLI with no MCP — target 0. THE HEADLINE (a first-class ding experience, not degraded)."

# DEPENDENCY (flag): exercises smalltalk's `st message reply` CLI + `st launch claude --ding` + the `st ding`
# sidecar. This cell is the regression guard for the no-MCP reply path — the bug that slipped had no such guard.
[dependency]
smalltalk = "st message reply (threaded CLI verb) + st launch --ding + st ding sidecar + DING-BUS.md contract"
