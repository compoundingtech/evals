# Team-eval — Docs / DX. SDLC work-type: docs (sdlc-suite #10, "Explain it"). A team documents a
# module so that a FRESH developer with ONLY the docs (not the source) can use it correctly. The MOST
# distinct type on the board: prose deliverable + a downstream-usability held-out test. See FRAMEWORK.md.
id    = "docs"
title = "Document the checkout library so a cold newcomer can use it (README, docs-only lane)"
tier  = 1
axes  = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
Whether a small team (a coordinate-only supervisor + a writer that owns the repo, on real pty +
smalltalk) can produce documentation that actually WORKS — the "smalltalk README bar" made literal:
docs a fresh reader can use cold. The `checkout` cart library has THREE non-obvious, SILENT-FAILURE
contracts a newcomer cannot guess from names, that only good docs reveal:
  - C1 units: money is integer CENTS; tax is BASIS POINTS (800 = 8%). Pass dollars/percent -> silently 100x/off.
  - C2 immutability: add/applyPromo/setTax/seal each return a NEW cart; discard the return -> silent no-op.
  - C3 order: seal() before total(), else total() silently returns the raw subtotal (no promo/tax), no error.
The functional suite is GREEN and exercises all three (so they're discoverable by reading), but the
stub README says nothing. It forces the docs skills: READ the code+tests to understand the real
contracts, EXTRACT the non-obvious ones a newcomer would trip on, and EXPLAIN them accurately (a
confident-but-wrong doc is worse than none). The discriminator is downstream: a FRESH cold-reader
agent with ONLY the docs must complete a real task correctly.
"""

[setup]
worker_repo = "${EVAL_SANDBOX:-./.sandbox}/docs/worker  (checkout lib; owned by doc-writer, distinct git author)"
sup_dir     = "${EVAL_SANDBOX:-./.sandbox}/docs/sup  (doc-sup; coordinate-only, owns NO repo)"
start_state = "GREEN suite (4 tests) exercising the 3 contracts; a STUB README (says nothing); src frozen"
lane        = "DOCS lane: the deliverable is documentation (README.md + docs/); src/ + test/ stay byte-identical (behavior unchanged)."
builder     = "fixtures/docs/setup-sandbox.sh (deterministic; validates suite-green + correct-answer=1944 + the 3 contracts are load-bearing on build)"

[team]
doc-sup    = "supervisor (manager persona), Claude --permission-mode bypassPermissions (spawn-capable), coordinate-only"
doc-writer = "technical writer (specialist persona), Claude --permission-mode auto, owns the checkout repo"
posture    = "the operator's rule: SUPERVISOR=bypass, WORKER=auto. Ephemeral: role=agent, no strategy=permanent."
kick       = "hermetic docs request seeded into doc-sup's inbox (fixtures/docs/kick-supervisor.md)"

[isolation]
enforce = "doc-sup owns no repo (structural — its dir is not a git repo); doc-writer owns checkout only; DOCS lane = src/ unchanged"
detect  = "post-run, attribute every commit — any change to checkout by a non-owner (or a sup commit) FAILS; any src/ change FAILS the docs lane"
prove   = "the whole loop — delegation, the docs, the verification — is visible in the coord thread"
verdict = "PASS/FAIL hard gate"

[grader]
mechanical = "fixtures/docs/grade.sh — isolation (only doc-writer authored; src/ byte-identical; sup not a repo) + suite green + docs written + completeness keyword-signals for the 3 contracts + return shape."
held_out   = """
THE DISCRIMINATOR — fixtures/docs/cold-reader.sh: a FRESH `claude --print` agent (no coord/persona/memory)
gets ONLY the team's docs + the library as a MANGLED BLACK BOX (input identifiers stripped so peeking
reveals nothing about the conventions) + a task in HUMAN terms ($12.50, 8% tax). It must produce the
library's total(). PASS iff totalCents === 1944 (the docs conveyed all load-bearing contracts).
Pre-validated to discriminate: GOOD mock docs -> 1944 (PASS); BAD/stub docs -> 20 (FAIL).
"""
hermetic   = "fully offline (node --test, claude --print); base commit preserved for the docs-lane diff."

[quality]
type   = "cross-family LLM-judge + human read of the docs against source"
method = "accurate (matches the code)? complete (all 3 load-bearing contracts + return shape)? a correct runnable example? accuracy over volume — a confident-but-wrong doc fails. Bonus: edge cases surfaced."

[autonomy]
metric = "rescue-interventions after the kick; wake-nudges are harness tax, not rescues"

[cost]
metric = "tokens + wall-clock for the team + the cold-reader"

[coordination]
metric = "clean request->delegate->document->verify->confirm arc; did the supervisor verify from ground truth (read docs vs source, run tests) rather than trust the self-report?"

[observability]
report = "per-agent trajectory; the docs commit; doc-sup's ground-truth verification; the cold-reader result.json + log (the held-out proof); grade.sh output."
