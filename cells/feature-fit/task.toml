# Team-eval — Feature-fit. SDLC work-type: feature-in-existing-code (sdlc-suite #6, "Fit in"). A team
# adds a feature to a non-trivial EXISTING repo so it FITS the house conventions. Discriminator:
# idiomatic fit (a reviewer couldn't tell it was added later), not just a functional-but-alien impl.
id    = "feature-fit"
title = "Add a `rename` command to the tasklit library, matching its established conventions"
tier  = 1
axes  = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
Whether a small team (a coordinate-only supervisor + a specialist that owns the repo, on real pty +
smalltalk) can add a feature to an EXISTING codebase so it FITS — harder than greenfield because you
must READ the code and MATCH it. `tasklit` is a small task-command library with STRONG, DISTINCTIVE,
CONSISTENT conventions across 4 existing commands (add/list/done/remove):
  - K1 Result pattern: code NEVER throws; every run() returns ok(value)/fail(code,message) from result.js.
  - K2 shared validators: input checks reuse positiveInt/nonEmptyString from validate.js (never inlined).
  - K3 command-module shape: { name, describe, run(args, store) } in src/commands/<name>.js, REGISTERED in index.js.
  - K4 tests: one per command at test/commands/<name>.test.js (node:test, asserting the {ok,...} shape).
The suite is GREEN. The feature request (add a `rename` command) deliberately does NOT enumerate these
conventions — reading the existing code and matching it is the test. It forces the feature-fit skills:
READ an unfamiliar codebase, INFER its conventions, and slot the feature in idiomatically (reuse the
shared helpers, follow the Result pattern, wire it into the registry, ship a matching test) rather than
hack in a functionally-correct-but-alien implementation.
"""

[setup]
worker_repo = "${EVAL_SANDBOX:-./.sandbox}/feature-fit/worker  (tasklit; owned by feat-dev, distinct git author)"
sup_dir     = "${EVAL_SANDBOX:-./.sandbox}/feature-fit/sup  (feat-sup; coordinate-only, owns NO repo)"
start_state = "GREEN suite (9 tests) across 4 commands establishing the conventions; NO rename yet"
builder     = "fixtures/feature-fit/setup-sandbox.sh (deterministic; validates suite-green + rename-absent + SOLVABLE via a reference idiomatic rename on a scratch copy)"

[team]
feat-sup = "supervisor (manager persona), Claude --permission-mode bypassPermissions (spawn-capable), coordinate-only"
feat-dev = "specialist (specialist persona), Claude --permission-mode auto, owns the tasklit repo"
posture  = "the operator's rule: SUPERVISOR=bypass, WORKER=auto. Ephemeral: role=agent, no strategy=permanent."
kick     = "hermetic feature request seeded into feat-sup's inbox (fixtures/feature-fit/kick-supervisor.md) — does NOT list the conventions"

[isolation]
enforce = "feat-sup owns no repo (structural — its dir is not a git repo); feat-dev owns tasklit only"
detect  = "post-run, attribute every commit — any change to tasklit by a non-owner (or a sup commit) FAILS the run"
prove   = "the whole loop — delegation, the feature, the verification — is visible in the message thread"
verdict = "PASS/FAIL hard gate"

[grader]
mechanical = """
fixtures/feature-fit/grade.sh — hard gates: isolation + suite-green + FUNCTIONAL (the new `rename` works
via dispatch, which enforces REGISTRATION + the Result SHAPE) + a matching test was added. Then
CONVENTION-FIT signals (the discriminator): no `throw` (K1), uses ok()/fail() from result.js (K1),
reuses validate.js (K2), { name, describe, run } shape + registered (K3). A throw or missing
registration is also caught HARD by the functional gate; the softer fit greps catch functional-but-alien.
"""
validated = "VALIDATED on 3 mocks: idiomatic -> 10/0/0; functional-but-ALIEN (hand-rolled results + inlined validation) -> 8/0/2 WARN; THROWS -> 6/3 FAIL. The fit greps separate idiomatic from merely-functional."
hermetic  = "fully offline (node --test); base commit preserved for the diff."

[quality]
type   = "cross-family LLM-judge + human read of the diff against the existing commands"
method = "does the feature match the house style — Result pattern, shared helpers reused, module shape + wiring, matching test in the right place? Error codes/messages consistent? Minimal diff, no gratuitous refactor? Functional-but-alien = low quality even if it works."

[autonomy]
metric = "rescue-interventions after the kick; wake-nudges are harness tax, not rescues"

[cost]
metric = "tokens + wall-clock for the tree"

[coordination]
metric = "clean request->delegate->read->implement->verify->confirm arc; did the supervisor verify from ground truth (read the diff, run the suite, drive dispatch) and hold the FIT bar rather than rubber-stamp?"

[observability]
report = "per-agent trajectory; the feature commit + diff; feat-sup's ground-truth verification; grade.sh output (function + fit)."
