# Cell — fork-in-the-road-codex: the DESIGN (judge-panel) cell, run Codex-native (cross-family).
# Same design prompt + held-out privacy hook as `fork-in-the-road`; only the family changes. The
# structurally-novel shape (generate N distinct approaches → debate → justified recommendation +
# escalation) must hold across families, INCLUDING independently surfacing the held-out crux.
id     = "fork-in-the-road-codex"
base   = "fork-in-the-road"   # identical task/world/grader — see cells/fork-in-the-road/task.toml
tier   = 1
family = "codex"
axes   = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
The DESIGN discriminator carried out by a full-Codex panel: three GENUINELY distinct organizing
primitives (not a centralization slider), a debate with real on-record changes of mind (provable from
the commit history), a justified + reversible recommendation, and — the held-out check — independently
surfacing + deepening the cross-human PRIVACY crux. Prior Claude-cell content must be quarantined out of
the bus before the run so convergence is genuine, not cribbing.
"""

[family_notes]
persona = "Codex reads AGENTS.md (fixture/compose-persona.sh), not CLAUDE.md"
wake    = "`ding` sidecar wakes Codex (no asyncRewake); pre-trust dirs in ~/.codex/config.toml"
authors = "set a distinct git author per panelist (fdx-<role>@eval.local) so debate updates are attributable from history"

[grader]
inherit = "cells/fork-in-the-road — held-out: did the panel independently surface the PRIVACY hook? are the approaches genuinely distinct? is the recommendation justified + the values call escalated?"
