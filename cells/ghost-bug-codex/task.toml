# Cell — ghost-bug-codex: the DEBUG cell, run Codex-native (cross-family).
# Same bug, same world, same discriminator as `ghost-bug`; the only variable is the model family.
# This is how the suite proves "it's the system, not the model": a full-Codex team must reach the
# identical root-cause fix + mutation-valid regression test that the Claude team does.
id     = "ghost-bug-codex"
base   = "ghost-bug"     # identical task/world/grader — see cells/ghost-bug/task.toml
tier   = 1
family = "codex"
axes   = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
The DEBUG discriminator (reproduce → ROOT-cause the shared-default mutation → minimal non-mutating
fix → add a regression test that FAILS on the base commit) carried out by a full-Codex supervisor +
worker instead of a Claude team. Passing here on the same frozen world is the cross-family proof.
"""

[family_notes]
persona   = "Codex reads AGENTS.md (composed by fixture/compose-persona.sh), not CLAUDE.md"
wake      = "Codex has no asyncRewake — a `ding` sidecar watches the inbox and pokes the session (see configure-codex-agent.sh)"
launch    = "pre-trust the dirs in ~/.codex/config.toml so the first-run trust gate doesn't block unattended launch"

[grader]
inherit = "cells/ghost-bug — held-out: the new regression test must FAIL on the base buggy commit; the fix must be the non-mutating merge, not a band-aid"
