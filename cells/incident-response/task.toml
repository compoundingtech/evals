# Team-eval — Incident-response. SDLC work-type: incident/hotfix (sdlc-suite #7, "Prod is down").
# A team handles a LIVE production failure: triage -> stop the bleed -> ROOT-cause fix + regression
# test. Discriminator: urgency + NOT stopping at the band-aid (a mitigation that suppresses the 500
# but leaves the returned values WRONG is not a resolved incident). See FRAMEWORK.md.
id    = "incident-response"
title = "Prod is down: pulse /stats returns 500s — triage, mitigate, root-cause fix + regression test"
tier  = 1
axes  = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
Whether a small team (an incident-commander supervisor + an on-call specialist that owns the repo, on
real pty + smalltalk) can run a real production incident to a CORRECT resolution under urgency — the
distinct MODE none of the calm/single-phase cells test. The `pulse` metrics service is throwing 500s on
`GET /stats` in prod. Root cause: an OFF-BY-ONE in `percentile()` — it indexes the ascending-sorted
samples with the 1-based nearest RANK as a 0-based index (`sorted[ceil(p*N)]`), so it (a) reads OUT OF
BOUNDS -> `undefined.toFixed` TypeError -> 500 for small-sample metrics (latency/checkout), and (b)
returns silently-WRONG (off-by-one-high) percentiles for everything else. The suite is GREEN: it only
exercises a healthy 24-sample `orders` metric and asserts percentiles loosely, so the latent bug passed
CI — a classic incident. It forces the incident skills: TRIAGE (reproduce the 500, find the failing
path), MITIGATION (get /stats responding again), and — the part a 'make the error go away' team fails —
ROOT-CAUSE over BAND-AID: the tempting quick fixes (a try/catch that returns a placeholder, or clamping
the index to len-1) STOP the 500 but leave p50 off-by-one WRONG. Only correcting the formula
(`ceil(p*N)-1`) restores correct values. Plus a REGRESSION TEST that would have caught it (fails on the
bug, passes after the fix) without weakening the suite. The held-out checks are ground-truthed: the
returned percentiles must equal the independently-computed nearest-rank truth (band-aid detector), and
the regression test must be mutation-valid (red on the base buggy src).
"""

[setup]
worker_repo = "${EVAL_SANDBOX:-./.sandbox}/incident-response/worker  (pulse metrics service; owned by ir-oncall, distinct git author)"
sup_dir     = "${EVAL_SANDBOX:-./.sandbox}/incident-response/sup  (ir-sup; coordinate-only, owns NO repo)"
service     = "pulse: node:http /event + /stats?metric=NAME -> {count,sum,avg,p50,p95}; state seeded from data/events.json"
root_cause  = "percentile() off-by-one: sorted[ceil(p*N)] uses 1-based rank as 0-based index -> OOB crash on small metrics + off-by-one-high values"
symptom     = "GET /stats?metric=latency|checkout -> 500 (undefined.toFixed); orders (24 samples) -> 200. Suite GREEN (only tests orders, loosely)."
builder     = "fixtures/incident-response/setup-sandbox.sh (deterministic; validates green-suite + crash-reproduces + off-by-one-observable + root-fix-resolves-both on build)"
solvable    = "VERIFIED: the root fix `sorted[ceil(p*N)-1]` (+empty guard optional) fixes BOTH the crash and the wrong values; a mutation-valid regression test pins the correct nearest-rank p50/p95."

[team]
ir-sup    = "supervisor / incident commander (manager persona), Claude --permission-mode bypassPermissions (spawn-capable), coordinate-only"
ir-oncall = "on-call specialist (specialist persona), Claude --permission-mode auto, owns the pulse repo"
posture   = "the operator's rule: SUPERVISOR=bypass, WORKER=auto. Ephemeral: role=agent, no strategy=permanent."
kick      = "hermetic incident PAGE (symptoms only; root cause is theirs to diagnose) seeded into ir-sup's inbox (fixtures/incident-response/kick-supervisor.md)"

[isolation]
enforce = "ir-sup owns no repo (structural — its dir is not a git repo, cannot commit); ir-oncall owns pulse only"
detect  = "post-run, attribute every commit — any change to pulse by a non-owner (or a sup commit) FAILS the run"
prove   = "the whole incident — page, delegation, triage, mitigation, root fix, verification — is visible in the message thread"
verdict = "PASS/FAIL hard gate"

[grader]
visible_tests       = "the pulse suite must be green after the fix (the team runs npm test)"
held_out_acceptance = """
Independent of the team's own tests, on the final repo (fixtures/incident-response/grade.sh):
  1. ROOT-CAUSE CORRECTNESS (band-aid detector): computeStats(values).p50/p95 must equal the independently-
     computed nearest-rank truth (sorted[ceil(p*N)-1]) for the frozen `latency` data AND for a known
     [1..15] array where the off-by-one is observable (correct p50=8, buggy=9). A try/catch or index-clamp
     band-aid stops the 500 but returns the WRONG p50 -> FAILS this gate. This is the discriminator.
  2. MUTATION-VALID regression test: HEAD's tests run against the BASE (buggy) src must go RED (an assertion
     failure, not an import error); green on both = green-washing -> FAIL.
  3. SUITE GREEN on HEAD + ISOLATION (only ir-oncall authored; sup dir owns no repo).
"""
hermetic            = "runs on the isolated sandbox clone, fully offline (node --test, node:http); base commit preserved for ground-truth comparison."

[quality]
type   = "cross-family LLM-judge on the diff + the message thread (a Claude judge inflates Claude ~4-7pts)"
method = "smallest correct change (fixed the formula, didn't rewrite the service)? mitigation-vs-root narrated? regression test real + not weakening the suite? empty-metric edge also guarded (bonus)? band-aid left as final state = low score."

[autonomy]
metric = "rescue-interventions after the page (planned-gate vs rescue); wake-nudges are harness tax, not rescues; a message to the team = rescue"

[cost]
metric = "tokens + wall-clock for the tree — capture if instrumented; else wall-clock from the message thread timestamps"

[coordination]
metric = "clean triage->delegate->mitigate->root-fix->verify arc; the TWO-PHASE quality (did the sup hold the bar and reject a band-aid if offered?); handoffs visible; no thrash/duplication"

[observability]
report = "per-agent trajectory (page -> triage -> mitigation -> root fix -> regression test -> verify); the incident arc as a timeline; problems (parks, false starts); intervention log; the grade.sh ground-truth output."
