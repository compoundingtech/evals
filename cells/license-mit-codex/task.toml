# Cell — license-mit-codex: the smallest team loop (delegate->execute->verify->confirm), run Codex-native.
# Same task/world/grader as `license-mit`; the ONLY variable is a full-Codex team. A single-family point
# next to the matrix (Claude / Mixed) — confirms the loop works Codex-native, not only Claude/Mixed.
id     = "license-mit-codex"
base   = "license-mit"    # identical task/world/grader — see cells/license-mit/task.toml
tier   = 0
family = "codex"
axes   = ["isolation", "task-success", "coordination", "autonomy"]

evaluates = """
The smallest end-to-end proof of the system's core claim, carried out by a full-Codex team: given ONE
instruction ("the license should be MIT") and nothing but the personas, does a two-agent tree produce the
right coordinated behaviour? The supervisor (lmc-sup) must NOT do the edit itself — it relays a clear task
to the worker (lmc-worker) that owns the widget repo, lets the worker execute + commit in its own repo,
then verifies read-only and confirms back to the requester. Isolation is the hard gate: a supervisor that
"helpfully" edits the LICENSE itself FAILS even though the license would be correct, because it falsified
the coordination guarantee. Cross-family comparison against the Claude and Mixed runs of the identical
task/world is the point — only the composition changes.
"""

[family_notes]
persona = "Codex reads AGENTS.md (fixture/compose-persona.sh), not CLAUDE.md"
wake    = "`ding` sidecar wakes Codex (no asyncRewake); pre-trust dirs in ~/.codex/config.toml; pre-create the st dir so ding doesn't die on a missing folder"
author  = "the worker commits as a distinct git author (lmc-worker@eval.local) so isolation is provable from commit metadata (the sup dir isn't a git repo -> structural isolation)"

[grader]
inherit = "cells/license-mit — HARD GATE: only lmc-worker commits to the widget repo (sup owns no repo); LICENSE is canonical MIT, committed, tree clean; all coordination visible on the bus (delegate->report->verify->confirm); autonomy = rescues after the kick (ding-wake nudges tracked separately)"
