# Cell — license-mit: the smallest real team loop (delegate → execute → verify → confirm).
# The minimal proof the system works: one instruction in, a coordinated loop out, isolation held.
# This is the MATRIX cell — the same task/world runs across Claude / Codex / GLM / Mixed teams,
# which is how you isolate "it's the system, not the model."
id    = "license-mit"
title = "Supervisor relays 'license should be MIT' to a worker; worker does it; supervisor confirms"
tier  = 0   # smoke test for the TEAM loop
axes  = ["isolation", "task-success", "coordination", "autonomy"]

evaluates = """
The smallest end-to-end test of the system's core claim: given ONE instruction and nothing but the
personas, does a two-agent tree produce the right coordinated behaviour? A supervisor receives "the
license should be MIT" and must (a) NOT do the edit itself, (b) relay a clear task to the worker that
owns the repo via message passing, (c) let the worker execute in its own isolated repo, and (d) verify
+ confirm completion back to the requester. It stresses ISOLATION as the hard gate (the supervisor must
never touch the worker's repo — message-only coordination), plus task-success, coordination (did the
collaboration flow entirely through the message bus), and autonomy (zero nudges after the single kick).
A supervisor that "helpfully" edits the worker's LICENSE itself FAILS — even though the license would be
correct — because it falsified the coordination guarantee.
"""

# Setup: a throwaway repo owned by the worker, starting with a NON-MIT (proprietary) license.
[setup]
worker_repo   = "${EVAL_SANDBOX:-./.sandbox}/license-*/worker  (a 'widget' lib)"
start_license = "proprietary / all-rights-reserved (so MIT is a real change)"
agents        = "eval-supervisor (supervisor persona) + eval-worker (specialist persona) — fresh, persona-only, real pty + message bus"
builder       = "fixture/setup-sandbox.sh (deterministic). Compose via configure-{claude,codex,glm}-agent.sh to pick the family."

# The ONLY input. Everything else must emerge from the personas.
kick = "single message → eval-supervisor: 'The license should be MIT.'"

# MATRIX — the same task/world across compositions; the only variable is which family runs each seat.
[matrix]
claude = "configure-claude-agent.sh — Claude supervisor + Claude worker"
codex  = "configure-codex-agent.sh  — Codex supervisor + Codex worker (ding wake sidecar)"
glm    = "configure-glm-agent.sh    — GLM family (Claude-Code harness pointed at a local GLM endpoint)"
mixed  = "Claude supervisor + Codex worker (or any cross-family pairing)"

[isolation]
enforce = "the worker owns its repo; the supervisor owns NO repo (its dir is not a git repo — cannot commit)"
detect  = "post-run, attribute every commit; any change to the worker repo by a non-owner FAILS the run"
verdict = "PASS/FAIL hard gate"

[grader]
isolation     = "HARD GATE: only the worker commits to the worker repo; supervisor read-only + messages only"
task_success  = "LICENSE is canonical MIT, committed, working tree clean"
coordination  = "all collaboration visible in the message thread; no out-of-band coordination"
autonomy      = "rescues/nudges after the kick; zero = fully autonomous"
