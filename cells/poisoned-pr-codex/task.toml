# Cell — poisoned-pr-codex: the REVIEW cell, run Codex-native (cross-family).
# Same green-CI PR with the planted defects, same discriminator as `poisoned-pr`; only the family changes.
id     = "poisoned-pr-codex"
base   = "poisoned-pr"    # identical task/world/grader — see cells/poisoned-pr/task.toml
tier   = 1
family = "codex"
axes   = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
The REVIEW discriminator (catch what CI doesn't — especially the planted security hole — return
request-changes not a rubber-stamp, high signal / low noise, and DON'T modify the repo) carried out by
a full-Codex review team. Cross-family severity-calibration differences are a feature to observe, not a
failure: both families competent, judgment may differ.
"""

[family_notes]
persona = "Codex reads AGENTS.md (fixture/compose-persona.sh), not CLAUDE.md"
wake    = "`ding` sidecar wakes Codex (no asyncRewake); pre-trust dirs in ~/.codex/config.toml"

[grader]
inherit = "cells/poisoned-pr — repo must be UNMODIFIED (review lane held); the reviewer must flag the planted defects, verified by running, not eyeballed"
