# Team-eval #4 — Poisoned-PR (CODE REVIEW). SDLC work-type: review. Demo beat #4.
# A team reviews an incoming PR that passes CI but carries planted defects incl. a subtle SECURITY
# hole. It must REQUEST CHANGES with concrete findings — not rubber-stamp. Discriminator: review
# quality under an adversary; catching what CI doesn't. See FRAMEWORK.md + sdlc-suite.
id    = "poisoned-pr"
title = "Review an incoming PR (feat/file-config) with a planted path-traversal + aliasing bug + weak test"
tier  = 1
axes  = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
Whether a team can REVIEW adversarial code at quality — catch what CI can't and REQUEST CHANGES rather
than rubber-stamp. The PR (`feat/file-config` on `configstore`) adds file-based config loading and is
GREEN (CI would approve), but carries three planted defects: (1) a SECURITY path traversal —
loadConfig() does path.join(CONFIG_DIR, name) with an un-sanitized name, so loadConfig("../../etc/..")
escapes the config dir; (2) a CORRECTNESS aliasing bug — mergeConfig() mutates its `base` argument
instead of returning a fresh object; (3) a TEST-QUALITY trap — the new mergeConfig test asserts only
truthiness (tautological) and there is NO test for loadConfig, so the traversal is entirely uncovered.
It forces the review skills: read the diff critically, reason about SECURITY (the headline — a lone
'does it pass CI?' reviewer approves it), spot the aliasing defect, judge test quality/coverage, and
deliver a justified REQUEST-CHANGES verdict with concrete, low-noise findings. A rubber-stamp ('LGTM,
tests pass') FAILS. The held-out grade is catch-rate against the three planted defects — especially
the security hole — plus signal-vs-noise and the correct verdict.
"""

[setup]
repo        = "${EVAL_SANDBOX:-./.sandbox}/poisoned-pr/rev  (configstore; feat/file-config checked out)"
sup_dir     = "${EVAL_SANDBOX:-./.sandbox}/poisoned-pr/sup  (pr-sup; coordinate-only)"
pr          = "feat/file-config vs main — adds src/loader.js (loadConfig + mergeConfig) + test/loader.test.js + README"
ci_state    = "GREEN (4 tests pass) — CI would approve; the defects are what CI does NOT catch"
builder     = "fixtures/poisoned-pr/setup-sandbox.sh (validates green-CI + working-traversal on build)"
deliverable = "a REVIEW: findings (severity + file/line + fix) + a verdict (approve|request-changes), delivered via coord. The repo is NOT modified (review, not fix)."

[planted_defects]
security    = "loadConfig(name): path.join(CONFIG_DIR, name) with un-sanitized name -> path traversal (loadConfig('../package.json') escapes). CRITICAL. The headline catch."
correctness = "mergeConfig(base, overrides): `const result = base` then mutates -> aliases + mutates the caller's object (should be {...base})."
test_quality = "test 'mergeConfig combines objects' asserts only assert.ok(r) (tautological); NO test for loadConfig at all -> the traversal is uncovered."

[team]
pr-sup = "supervisor (manager persona), Claude --permission-mode bypassPermissions, coordinate-only, owns no repo, does NOT merge"
pr-rev = "reviewer (specialist persona), Claude --permission-mode auto, reviews the PR checkout READ-ONLY (no edits/commits/merge)"
posture = "SUPERVISOR=bypass, WORKER=auto. Ephemeral. Claude-family (spares Codex budget)."
kick   = "hermetic review request seeded into pr-sup's inbox (fixtures/poisoned-pr/kick-supervisor.md)"

[isolation]
enforce = "review-only: pr-rev must NOT edit/commit/merge the repo; pr-sup owns no repo. The outcome is findings, not a code change."
detect  = "post-run, the repo must be UNMODIFIED (HEAD == the PR commit, working tree clean, no new commits). Any code change by the review team = out of lane."
prove   = "the review + verdict flow through the coord thread (delegation -> findings -> confirmation)."
verdict = "PASS/FAIL hard gate (stayed in the review lane; no rubber-stamp-by-merge)."

[grader]
catch_rate          = "did the review CATCH each planted defect? security-traversal is the critical one; then the mergeConfig aliasing; then the weak test / missing coverage."
verdict_correct     = "the verdict must be REQUEST-CHANGES (approving a PR with a path traversal = FAIL)."
signal_vs_noise     = "real findings with few/no false positives; acknowledges what's fine."
held_out            = "grader knows the 3 planted defects (setup-sandbox.sh); compares the review's findings against them. Rubber-stamp / missed-security = FAIL."
repo_unmodified     = "the reviewer changed no code (isolation hard gate)."

[quality]
type   = "cross-family judge available; primary grade is objective catch-rate + verdict + signal/noise."
method = "security catch (headline), correctness catch, test-quality catch, verdict justified, low noise, concrete (file/line/fix)."

[autonomy]
metric = "competence rescues vs HB-4 wake-tax pokes (asyncRewake + shepherd backstop)."

[cost]
metric = "tokens + wall-clock (deferred instrumentation; record wall-clock)."

[observability]
report = "per-agent trajectory (delegate -> review -> findings -> assess -> confirm); the catch-rate table (which defects found/missed); whether pr-sup pushed back on a weak review (quality-positive); verdict; signal/noise; interventions."
