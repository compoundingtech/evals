# Cell: restorability — an agent RESTORES WITHOUT `--resume`/`--session-id`. A `convoy reload` (kill + respawn
# from the stored pty.toml command = fresh transcript, NO --resume) comes back FUNCTIONAL by reconstructing its
# working state from now.md (via the SessionStart hook) + git + bus — and, the sharp part, inherits NO stale
# session state (a stuck CC input-queue) the way a `--resume` restore does.
#
# WHY THIS EXISTS (Nathan mandate). The reboot default is being moved OFF session-preservation (`--resume`). A real
# incident exposed why: a `--resume` respawn RESTORED a stuck Claude Code input-queue (a poke that kept replaying
# after its message was archived), so the agent came back but wedged. `convoy reload` already respawns from the
# stored pty.toml command — NO --resume, fresh transcript — so the ONLY way state survives is externalization
# (now.md). This cell is the held-out SUITE form of that guarantee.
#
# RELATION TO EXISTING PROOF: convoy's `doctor` CHECK 4 (checkStateExternalization / "restartability thesis")
# ALREADY proves the core mechanism (seed now.md -> convoy reload no-resume -> SessionStart hook reconstructs ->
# agent acts). That is a per-setup READINESS check. This cell is the GRADED, held-out eval-suite regression guard
# for the same guarantee, and ADDS the incident-derived assertion doctor does not: no stuck-queue inheritance.
id    = "restorability"
title = "An agent restores WITHOUT --resume/--session-id: convoy reload (fresh transcript) reconstructs work-state from now.md and inherits NO stuck session-queue"
tier  = 1
axes  = ["isolation", "task-success", "autonomy", "coordination"]

evaluates = """
Whether an agent cold-restarted with NO --resume/--session-id survives — reconstructing its working state purely
from externalized durable substrate — and does so WITHOUT inheriting stale session state. Two halves:

(a) RECONSTRUCTION (the restartability thesis, mirrors convoy doctor CHECK 4 as a held-out suite cell): spawn a
    real agent; externalize a resume-task into now.md; COLD-restart it via `convoy reload` (kill + respawn from the
    stored pty.toml command — NO --resume, fresh transcript, so externalization is the ONLY path back); assert the
    cold-booted agent picks up now.md via the SessionStart hook and ACTS on the task (writes its token), 0 human
    rescues. If the hook is blocked or now.md is empty/absent, reconstruction silently never happens — a real gap.

(b) NO STUCK-QUEUE (the incident-derived novel gate): a poke that was queued/pending BEFORE the restart (whose
    message is already archived) must NOT replay to the cold-booted agent. A `convoy reload` (no --resume, fresh
    transcript) inherently drops the CC input-queue; the MATCHED NEGATIVE CONTROL — the same session brought back
    WITH --resume — DOES replay the stuck poke. The contrast (reload=clean vs --resume=carries-it) is the whole
    point: it quantifies why the no-resume path is the safer restore. (This is the exact failure the cos incident
    hit: a --resume respawn replayed an archived poke every turn.)

A false PASS — a "reload" that secretly resumed, reconstruction asserted without a real now.md injection, or a
control that cannot actually detect the stuck queue — is worse than a FAIL.
"""

[setup]
work_dir = "${EVAL_SANDBOX:-/tmp}/restorability/net  (isolated convoy network; a real worker agent + a now.md seeded with a resume-task token + a bus inbox holding one ARCHIVED poke = the stuck-queue seed)"
mechanism = "convoy reload <id> — kills + respawns the agent from its STORED pty.toml command (NO --resume, fresh transcript). This is the real reboot restart path; `st launch` is retired. Unlike `pty restart`, reload never ATTACHes, so it works even from inside a pty (and it dodges the pty-restart env-leak that caused the incident)."
seed = "now.md = a durable resume-task ('run this exact command, then stand by'); bus inbox = a message that is already ARCHIVED (handled) — the seed a --resume restore would replay but a cold reload must not."
hooks = "HARD DEPENDENCY on the SessionStart now.md-injection hook + the write-side (Stop-flush) that keeps now.md fresh (smalltalk restorability-hooks work). Without the hook firing, cold reconstruction can't happen — the cell NAMES that cause on failure."
builder = "fixture/setup-sandbox.sh (deterministic; validates a green worker dir + non-empty now.md + the archived-poke seed on build)"

[scenario]
reconstruct = """
Spawn worker via `convoy add` under an isolated net; wait available; write now.md with a resume-task (echo a
unique token to a log). `convoy reload <id>` (no --resume). Assert the cold agent reconstructs from now.md via
the SessionStart hook and writes the token — 0 rescues. Mirrors convoy doctor checkStateExternalization, but as a
graded held-out cell (the SUITE regression guard, not a per-setup readiness check).
"""
no_stuck_queue = """
Before the reload, archive a poke in the agent's inbox (a handled message). After the no-resume reload, assert
that archived poke does NOT replay to the cold agent (no phantom re-poke). NEGATIVE CONTROL: bring the SAME
session back WITH --resume and show the stuck poke DOES replay — proving the test can detect it and that no-resume
is what avoids it.
"""

[grader]
mechanical = """
fixture/grade.sh — REAL run state, never a log-only claim. Hard gates:
  NO-RESUME    — the reload respawn command carried NO --resume/--session-id (assert from the actual respawn, not a claim).
  RECONSTRUCT  — the cold agent wrote its now.md resume-task token (reconstructed from durable state, 0 rescues).
  HOOK-FIRED   — the SessionStart hook injected now.md (else NAME the blocker, per doctor's hookBlockerFix).
  NO-STUCK-QUEUE — the pre-archived poke did NOT replay to the cold agent.
  CONTRAST     — the --resume control DID replay the stuck poke (the discriminator works).
  ISOLATION    — same identity across reload => same git author; nothing leaked to the global pty root.
"""
hermetic = "isolated convoy net; the injected reload + startup gates are SCENARIO pokes, not rescues (headline = 0 rescues)."

[integrity]
note = """
PASS = a real no-resume `convoy reload` came back functional by reconstructing now.md (SessionStart hook fired)
AND did not inherit the stuck queue, while the matched --resume control DID inherit it. Not a mocked reload, not a
log scrape. The negative control (the --resume replay) must actually fire, or the no-stuck-queue gate is vacuous.
"""

[dependency]
convoy = "convoy reload = the no-resume cold-restart mechanism (respawns from stored pty.toml). Ties to convoy doctor CHECK 4 (checkStateExternalization) — this cell is its held-out suite form + the stuck-queue extension. Also relevant: convoy's SAFE-RESPAWN follow-up (a name-preserving clean-env respawn so nobody hand-rolls pty restart)."
smalltalk = "SessionStart now.md-injection hook + Stop-flush write-side = the ENABLER; this eval is the PROOF the no-resume path works once those are solid."
reuse = "Cold-restart-without-resume + now.md reconstruction: convoy doctor checkStateExternalization (suite.ts). Team/isolation scaffolding: restart-continuity. The stuck-queue gate is new — the cos incident turned into an assertion."
