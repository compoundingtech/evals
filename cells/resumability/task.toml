# Cell: resumability (Arm D) — `st launch` RESUMES an agent's pinned session by default, so agents keep their
# context across a relaunch; `--fresh` is the deliberate opt-out. This is the mechanism the REBOOT MIGRATION
# relies on (it preserves each agent's .claude-session-id so agents resume, not restart). Deterministic (grades
# the --dry-run probe — no live agent / no box). Fully synthetic + hermetic. See README.md.
id    = "resumability"
title = "st launch resumes the pinned session by default (migration-safe); --fresh cleanly opts out"
tier  = 1   # deterministic mechanism cell (a substrate guarantee)
axes  = ["task-success", "autonomy"]

evaluates = """
Whether `st launch` RESUMES an agent's existing session by default (passing `--resume <sid>` from the pinned
`.claude-session-id`), so a relaunched agent keeps its context — and whether `--fresh` is a clean opt-out that
OMITS `--resume` (fresh context, must rehydrate from git+bus) while LEAVING THE PIN INTACT (so the next non-fresh
launch resumes as usual). This is the exact substrate guarantee the REBOOT MIGRATION relies on: the migration
preserves each agent's `.claude-session-id` so agents come back up RESUMED, not restarted-from-scratch. If default
launch stopped resuming, every agent would silently lose context on the reboot; if `--fresh` clobbered the pin,
the opt-out would be a one-way door. Complements restart-continuity (which tests COLD-restart durable-state
reconstruction — the `--fresh` side); this tests the RESUME side (the default, migration-critical path).
"""

# Frozen world: setup-sandbox.sh materializes an agent's cwd with a PINNED .claude-session-id (an agent that
# already has a live session) + a prior-context marker. Fully synthetic — never a real agent/session.
[[repos]]
repo = "work/ (the agent's cwd)"
role = "holds a pinned `.claude-session-id` (the existing session the migration preserves) + CONTEXT.md (a prior-context token for the live behavioral headline)."

# GRADER — deterministic (via `st launch --dry-run`, which prints the generated claude command without launching).
[grader]
resume  = "hard: the DEFAULT `st launch --dry-run` command contains `--resume <pinned-sid>` — the pinned session is resumed (context preserved)."
fresh   = "hard: the `--fresh --dry-run` command OMITS `--resume` — a genuinely fresh context (the deliberate opt-out)."
pin_intact = "hard: the `.claude-session-id` is UNCHANGED after the `--fresh` probe — `--fresh` is one-off; the next non-fresh launch resumes as usual."
behavioral = "live headline (rides the box): a default-resumed agent still knows CONTEXT.md's prior token in-context; a `--fresh` agent rehydrates from durable state. 0 rescues either way."

[autonomy]
metric = "0 rescues — a resumed agent picks up where it left off with no hand-holding; a --fresh agent rehydrates from git+bus unaided. THE reboot-migration guarantee."

# DEPENDENCY (flag): exercises `st launch`'s `.claude-session-id` reuse + `--resume`/`--fresh`. This cell is the
# regression guard for the reboot's session-preservation — deterministic, so it runs anywhere (no box).
[dependency]
smalltalk = "st launch: default reuses .claude-session-id -> --resume <sid>; --fresh omits --resume, leaves the pin. Ties to the convoy-up capstone's respawn-resume gate."
