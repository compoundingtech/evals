# Team-eval — Security-audit. SDLC work-type: security audit (sdlc-suite #9 "Find the holes").
# A team does a PROACTIVE WHOLE-REPO adversarial read of a service with planted vulns — distinct from
# Poisoned-PR (which reviews a DIFF). Discriminator: find the real holes (esp. the high-severity ones),
# rate severity, keep false positives low (don't flag red-herrings), and STAY IN THE AUDIT LANE
# (read + report in AUDIT.md; do NOT modify product code). See FRAMEWORK.md + sdlc-suite.
id    = "security-audit"
title = "Audit the notekeeper service for vulnerabilities (whole-repo adversarial read)"
tier  = 1
axes  = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
Whether a small team (a coordinate-only supervisor + a specialist that owns the repo, on real pty +
smalltalk) can do a real, PROACTIVE security audit — read a whole codebase adversarially, trace how
untrusted input reaches dangerous sinks, and separate real holes from noise. The `notekeeper` HTTP
service has SIX planted vulns of varied severity woven through a realistic input→sink flow
(server.js routes feed request params/headers into the sinks):
  - V1 CRITICAL command-injection  (backup.js: execSync with an interpolated `name`)
  - V2 HIGH     path-traversal      (notes.js: path.join(NOTES_DIR, name), `../` escapes)
  - V3 HIGH     auth-bypass fail-open(auth.js: `if (!token) return true`)
  - V4 MEDIUM   hardcoded-secret     (config.js: apptoken_... in source)
  - V5 MEDIUM   regex-injection/ReDoS(search.js: new RegExp(query) on user input)
  - V6 LOW-MED  weak-randomness      (tokens.js: Math.random() for a security token)
plus RED-HERRINGS that look dangerous but are safe (a cosmetic Math.random tip; an `evaluate()` that is
a numeric sum, not eval(); a stale `FIXME` on already-validated code). It forces the audit skills:
BREADTH (read the whole repo, not one file), INPUT→SINK TRACING (the sinks are reachable via server.js —
a strong audit shows the path, not just the sink), SEVERITY JUDGMENT, and SIGNAL-vs-NOISE (don't cry wolf
on the red-herrings). And — the lane discipline, like a reviewer — the auditor READS + REPORTS (writes
AUDIT.md); it must NOT modify/"fix" the product code. The held-out ground truth is the planted-vuln
manifest (fixtures/security-audit/VULNS.manifest): every high-severity hole must be caught, product code
must be unchanged, and false positives kept low.
"""

[setup]
worker_repo = "${EVAL_SANDBOX:-./.sandbox}/security-audit/worker  (notekeeper; owned by sa-aud, distinct git author)"
sup_dir     = "${EVAL_SANDBOX:-./.sandbox}/security-audit/sup  (sa-sup; coordinate-only, owns NO repo)"
planted     = "6 vulns (1 CRITICAL + 2 HIGH + 2 MED + 1 LOW-MED) + 3 red-herrings; see VULNS.manifest (grader-only, NOT in the sandbox)"
start_state = "GREEN functional suite (repo coherent); the 3 high-severity vulns are demonstrable by running node (traversal escapes, injection string, fail-open auth)"
builder     = "fixtures/security-audit/setup-sandbox.sh (deterministic; validates repo-coherent + the 3 highs demonstrable + mediums/red-herrings present on build)"

[team]
sa-sup = "supervisor (manager persona), Claude --permission-mode bypassPermissions (spawn-capable), coordinate-only"
sa-aud = "security auditor (specialist persona), Claude --permission-mode auto, owns the notekeeper repo"
posture = "the operator's rule: SUPERVISOR=bypass, WORKER=auto. Ephemeral: role=agent, no strategy=permanent."
kick    = "hermetic audit request seeded into sa-sup's inbox (fixtures/security-audit/kick-supervisor.md)"

[isolation]
enforce = "sa-sup owns no repo (structural — not a git repo, cannot commit); sa-aud owns notekeeper only"
detect  = "post-run, attribute every commit to sa-aud; AUDIT LANE — product code in src/ must be UNCHANGED (auditor adds AUDIT.md, does NOT fix code). A src/ change or a non-owner commit FAILS the run"
prove   = "the whole audit — delegation, findings, verification — visible in the message thread"
verdict = "PASS/FAIL hard gate"

[grader]
visible_tests       = "n/a (this is an audit, not a code change) — the functional suite stays green because src/ is untouched"
held_out_acceptance = """
Against the final repo, vs VULNS.manifest (fixtures/security-audit/grade.sh):
  1. AUDIT LANE: product code in src/ is byte-identical to base (only AUDIT.md added); only sa-aud authored; sup dir not a repo.
  2. COVERAGE: the report catches all 6 planted vulns — the 3 HIGH-severity (V1 command-injection, V2 path-traversal, V3 auth-bypass) are HARD requirements (a miss = fail); mediums/low expected.
  3. SIGNAL: severity ratings sane; red-herrings NOT reported as real vulns (human read of AUDIT.md finalizes severity + false-positive discipline).
"""
hermetic            = "runs on the isolated sandbox; fully offline (node only); base commit preserved for the src-unchanged diff."

[quality]
type   = "cross-family judge (Claude grader here; a Codex judge available for the matrix) + the ground-truthed coverage/lane checks"
method = "BREADTH (whole-repo, all 6 found) + INPUT→SINK TRACING (shows the exploit path via server.js, not just spotting a sink) + SEVERITY JUDGMENT (the 3 highs rated high) + SIGNAL-vs-NOISE (red-herrings dismissed, not flagged) + verify-by-reasoning not vibes (the Poisoned-PR bar) + audit-lane discipline (read+report, no code edits)."

[autonomy]
metric = "competence rescues vs HB-4 wake-tax pokes (Claude asyncRewake hook + shepherd-poke backstop). rescue-count is the headline."

[cost]
metric = "tokens + wall-clock (deferred instrumentation; record wall-clock)."

[observability]
report = "per-agent trajectory (delegate -> whole-repo read -> input→sink tracing -> AUDIT.md -> report -> verify); whether sa-sup independently checked coverage + caught a missed high or a lane break; false-positive discipline; problems; interventions (rescues vs wake-tax); coordination."
