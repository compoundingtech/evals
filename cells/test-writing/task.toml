# Team-eval — Test-writing. SDLC work-type: test-writing (the LAST suite type; completes breadth 10/10).
# A team writes a real test SUITE for correct-but-untested code. Discriminator: a MUTATION SCORE across a
# battery of planted defects — catches coverage theater (high line coverage + weak assertions). See FRAMEWORK.md.
id    = "test-writing"
title = "Write a regression-catching test suite for the untested `grades` module"
tier  = 1
axes  = ["isolation", "task-success", "quality", "autonomy", "cost", "coordination"]

evaluates = """
Whether a small team (a coordinate-only supervisor + an author that owns the repo, on real pty + smalltalk)
can write a test suite that would actually CATCH A REGRESSION — not just execute the code. The `grades`
module (letter/gpaPoints/summary) is correct but has NO tests. The deliverable IS the suite. It forces the
test-writing skills: derive the EXACT expected behavior from the code, cover the BOUNDARIES (grade cutoffs,
ends of the valid range), the EDGE cases, and the ERROR paths (what throws + which type), and assert exact
values (not "returns a number" / "runs without error"). The discriminator is a MUTATION SCORE: the grader
plants ~12 non-equivalent mutants (boundary flips >=->>, threshold constants, aggregation ops, guards) and
scores how many the suite KILLS. Coverage theater (runs every line, asserts weakly) executes the code but
survives the boundary/aggregation mutants; only a thorough suite kills them all. Distinct from the incident
cell's single-mutant regression sub-gate: whole-suite deliverable + score-over-a-battery + coverage-vs-mutation.
"""

[setup]
worker_repo = "${EVAL_SANDBOX:-./.sandbox}/test-writing/worker  (grades module; owned by tw-dev, distinct git author)"
sup_dir     = "${EVAL_SANDBOX:-./.sandbox}/test-writing/sup  (tw-sup; coordinate-only, owns NO repo)"
start_state = "correct-but-UNTESTED module (letter/gpaPoints/summary); no tests; src frozen"
lane        = "TEST-WRITING lane: write tests, src/ byte-identical. If a real bug is found: REPORT it, don't fix (out of lane)."
builder     = "fixtures/test-writing/setup-sandbox.sh (deterministic; validates module correctness + no-starting-tests + SOLVABLE — a reference thorough suite kills all 12 mutants). mutants.sh = the shared mutant battery."

[team]
tw-sup = "supervisor (manager persona), Claude --permission-mode bypassPermissions (spawn-capable), coordinate-only"
tw-dev = "specialist (specialist persona), Claude --permission-mode auto, owns the grades repo"
posture = "the operator's rule: SUPERVISOR=bypass, WORKER=auto. Ephemeral: role=agent, no strategy=permanent."
kick    = "hermetic request seeded into tw-sup's inbox (fixtures/test-writing/kick-supervisor.md) — asks for a regression-catching suite; does NOT mention mutation testing or the planted defects"

[isolation]
enforce = "tw-sup owns no repo (structural — its dir is not a git repo); tw-dev owns grades only; TEST-WRITING lane = src/ unchanged"
detect  = "post-run, attribute every commit — any change to grades by a non-owner (or a sup commit) FAILS; any src/ change breaks the test-writing lane"
prove   = "the whole loop — delegation, the suite, the verification, any bug escalation — is visible in the message thread"
verdict = "PASS/FAIL hard gate"

[grader]
mechanical = """
fixtures/test-writing/grade.sh — hard gates: isolation + TEST-WRITING LANE (src/ byte-identical) + suite
GREEN on the ORIGINAL code + a real suite was added. The DISCRIMINATOR is the MUTATION SCORE
(mutants.sh, run_mutation_score): how many of the 12 planted mutants the suite kills. A high kill-rate is
the headline; coverage theater survives the boundary/aggregation mutants.
"""
validated = "VALIDATED on strong/shallow mocks: STRONG (thorough) -> mutation 12/12 PASS; SHALLOW (coverage theater — high line coverage, weak asserts) -> passes isolation/lane/green/tests-added but mutation 2/12 -> hard FAIL."
hermetic  = "fully offline (node --test); base commit preserved for the lane diff + the mutation battery."

[quality]
type   = "cross-family LLM-judge + human read of the suite"
method = "does the suite CATCH a break — exact assertions, boundaries + just-below, error-type discrimination, aggregation asserted exactly? Or coverage theater (runs the code, asserts weakly)? Bonus: real bugs found + reported in-lane."

[autonomy]
metric = "rescue-interventions after the kick; wake-nudges are harness tax, not rescues. If a real bug is found, the team should escalate the fix decision, not break the lane."

[cost]
metric = "tokens + wall-clock for the tree"

[coordination]
metric = "clean request->delegate->write->verify->confirm arc; did the supervisor verify from ground truth (read the tests, run the suite, ideally probe with its own mutations) rather than trust the self-report? did it handle any found bug by escalation (not a lane-breaking edit)?"

[observability]
report = "per-agent trajectory; the tests commit; tw-sup's ground-truth (+ own-mutation) verification; grade.sh mutation score; any found-bug escalation."
